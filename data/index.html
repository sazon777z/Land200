<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LC200 Smart Watch</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background-glow"></div>
    <div class="container">
        <header>
            <h1>Toyota Landcruiser 200</h1>
            <div class="status-indicator online" id="connectionStatus"></div>
        </header>

        <main>
            <!-- Dashboard Card -->
            <section class="glass-card">
                <h2>Dashboard</h2>
                <div class="info-grid">
                    <div class="info-item">
                        <span class="label">Time</span>
                        <span class="value" id="timeValue">--:--</span>
                    </div>
                    <div class="info-item">
                        <span class="label">Temp</span>
                        <span class="value" id="tempValue">--°C</span>
                    </div>
                    <div class="info-item">
                        <span class="label">Weather</span>
                        <span class="value" id="weatherValue">--</span>
                    </div>
                </div>
            </section>

            <!-- Alarm Settings -->
            <section class="glass-card">
                <h2>Alarm</h2>
                <div class="control-group switch-group">
                    <label for="alarmEnabled">Status</label>
                    <label class="switch">
                        <input type="checkbox" id="alarmEnabled">
                        <span class="slider round"></span>
                    </label>
                </div>
                <div class="control-group">
                    <label for="alarmTime">Set Time</label>
                    <input type="time" id="alarmTime">
                </div>
                <div class="control-group">
                    <label for="alarmSound">Sound</label>
                    <select id="alarmSound">
                        <option value="1">V8 Engine Start</option>
                        <option value="2">V6 Engine</option>
                        <option value="3">Horn</option>
                        <option value="4">Alarm Beep</option>
                    </select>
                </div>
                <div class="button-group">
                    <button class="btn btn-primary" id="saveAlarmBtn">Save Alarm</button>
                    <button class="btn btn-secondary" id="testSoundBtn">Test Sound</button>
                </div>
            </section>

            <!-- System Settings -->
            <section class="glass-card">
                <h2>WiFi Configuration</h2>
                <div class="control-group">
                    <label>SSID (Network Name)</label>
                    <input type="text" id="wifiSsid" placeholder="Your WiFi Name">
                </div>
                <div class="control-group">
                    <label>Password</label>
                    <input type="password" id="wifiPass" placeholder="WiFi Password">
                </div>
                <button class="btn btn-primary" id="saveWifiBtn">Save & Reboot</button>
            </section>

            <!-- System Settings -->
            <section class="glass-card">
                <h2>System</h2>
                <div class="control-group">
                    <label>LED Brightness</label>
                    <input type="range" id="brightnessRange" min="0" max="255">
                </div>
                <button class="btn btn-danger" id="rebootBtn">Reboot System</button>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>

</html>
